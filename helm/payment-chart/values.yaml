replicaCount: 1

image:
  repository: cloudscale/payment-service
  tag: latest
  pullPolicy: Never

service:
  type: ClusterIP
  port: 80
  targetPort: 3003

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

config:
  PORT: "3003"
  DB_PORT: "5432"
  DB_NAME: "cloudscale"
  DB_SSL: "true"
  LOG_LEVEL: "info"

secrets:
  DB_HOST: "REPLACE_WITH_DB_HOST"
  DB_USER: "REPLACE_WITH_DB_USER"
  DB_PASSWORD: "REPLACE_WITH_DB_PASSWORD"
  JWT_SECRET: "REPLACE_WITH_JWT_SECRET"

healthCheck:
  liveness:
    path: /health/live
    port: 3003
  readiness:
    path: /health/ready
    port: 3003

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3003"
