name: CloudScale CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: cloudscale-eks-production

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      order: ${{ steps.filter.outputs.order }}
      payment: ${{ steps.filter.outputs.payment }}
      analytics: ${{ steps.filter.outputs.analytics }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
            order:
              - 'services/order-service/**'
            payment:
              - 'services/payment-service/**'
            analytics:
              - 'services/analytics-service/**'
            terraform:
              - 'terraform/**'

  lint:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: [auth-service, order-service, payment-service, analytics-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - run: npm ci
        working-directory: services/${{ matrix.service }}
      - run: npm run lint
        working-directory: services/${{ matrix.service }}

  lint-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.auth-service
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.order-service
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.payment-service
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.analytics-service

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [auth-service, order-service, payment-service, analytics-service]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudscale_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: services/${{ matrix.service }}
      - run: npm test
        working-directory: services/${{ matrix.service }}
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cloudscale_test
          DB_USER: test_user
          DB_PASSWORD: test_pass

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test, lint-docker, detect-changes]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: auth-service
            changed: ${{ needs.detect-changes.outputs.auth }}
          - service: order-service
            changed: ${{ needs.detect-changes.outputs.order }}
          - service: payment-service
            changed: ${{ needs.detect-changes.outputs.payment }}
          - service: analytics-service
            changed: ${{ needs.detect-changes.outputs.analytics }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - name: Configure AWS credentials
        if: matrix.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: matrix.changed == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: matrix.changed == 'true'
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build -f docker/Dockerfile.${{ matrix.service }} -t $ECR_REGISTRY/cloudscale/${{ matrix.service }}:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/cloudscale/${{ matrix.service }}:$IMAGE_TAG $ECR_REGISTRY/cloudscale/${{ matrix.service }}:latest
          docker push $ECR_REGISTRY/cloudscale/${{ matrix.service }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/cloudscale/${{ matrix.service }}:latest

  terraform:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: github.ref == 'refs/heads/main' && needs.detect-changes.outputs.terraform == 'true'
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan -var-file=terraform.tfvars

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]
    if: always() && github.ref == 'refs/heads/main' && needs.build-and-push.result == 'success'
    strategy:
      matrix:
        service: [auth-service, order-service, payment-service, analytics-service]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Deploy with Helm
        run: |
          CHART_NAME=$(echo ${{ matrix.service }} | sed 's/-service/-chart/')
          helm upgrade --install $CHART_NAME helm/$CHART_NAME/ \
            --namespace cloudscale \
            --create-namespace \
            --set image.tag=${{ github.sha }} \
            --wait --timeout 300s
