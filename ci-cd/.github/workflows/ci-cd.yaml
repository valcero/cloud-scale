name: CloudScale CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# No AWS credentials needed - everything runs locally for free

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      order: ${{ steps.filter.outputs.order }}
      payment: ${{ steps.filter.outputs.payment }}
      analytics: ${{ steps.filter.outputs.analytics }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
            order:
              - 'services/order-service/**'
            payment:
              - 'services/payment-service/**'
            analytics:
              - 'services/analytics-service/**'
            terraform:
              - 'terraform/**'

  lint:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        service: [auth-service, order-service, payment-service, analytics-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: services/${{ matrix.service }}
      - run: npm run lint
        working-directory: services/${{ matrix.service }}

  lint-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.auth-service
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.order-service
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.payment-service
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.analytics-service

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [auth-service, order-service, payment-service, analytics-service]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cloudscale_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: services/${{ matrix.service }}
      - run: npm test
        working-directory: services/${{ matrix.service }}
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cloudscale_test
          DB_USER: test_user
          DB_PASSWORD: test_pass

  build:
    runs-on: ubuntu-latest
    needs: [test, lint-docker]
    strategy:
      matrix:
        service: [auth-service, order-service, payment-service, analytics-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile.${{ matrix.service }} \
            -t cloudscale/${{ matrix.service }}:${{ github.sha }} \
            -t cloudscale/${{ matrix.service }}:latest .

  terraform-validate:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.terraform == 'true'
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
      - name: Terraform Init
        run: terraform init
      - name: Terraform Validate
        run: terraform validate
