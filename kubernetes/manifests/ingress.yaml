apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudscale-ingress
  namespace: cloudscale
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: api.cloudscale.example.com
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 80
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 80
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 80
          - path: /api/events
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 80
