apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: cloudscale
  labels:
    app: auth-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: auth-service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-service
  namespace: cloudscale
  labels:
    app: auth-service
